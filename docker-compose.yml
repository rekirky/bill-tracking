services:
  backend:
    image: ghcr.io/rekirky/bill-tracking-backend:latest
    container_name: billtracker-api
    restart: unless-stopped
    volumes:
      - /mnt/user/appdata/billtracker:/app/data
    environment:
      - DATABASE_URL=sqlite:////app/data/billtracker.db
    ports:
      - "5008:8000"

  frontend:
    image: ghcr.io/rekirky/bill-tracking-frontend:latest
    container_name: billtracker-ui
    restart: unless-stopped
    ports:
      - "5007:80"
    depends_on:
      - backend

  watchtower:
    image: containrrr/watchtower
    container_name: billtracker-watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: --interval 300 --cleanup billtracker-api billtracker-ui
