services:
  backend:
    build: ./backend
    container_name: billtracker-api
    restart: unless-stopped
    volumes:
      - /mnt/user/appdata/billtracker:/app/data
    environment:
      - DATABASE_URL=sqlite:////app/data/billtracker.db
    ports:
      - "8007:8000"

  frontend:
    build: ./frontend
    container_name: billtracker-ui
    restart: unless-stopped
    ports:
      - "5007:80"
    depends_on:
      - backend
